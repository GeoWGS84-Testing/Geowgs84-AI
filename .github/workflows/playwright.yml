name: Playwright Tests

on:
  # Schedule: Runs twice daily at 10:00 AM and 10:00 PM UTC
  schedule:
    - cron: '0 10,22 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Cancel in-progress runs if a new run is triggered on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # CRITICAL: Downloads the Uploadmodel.pth (168MB) via Git LFS
        lfs: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers (Chromium Only)
      # Installs ONLY Chromium and its system dependencies (no Firefox/WebKit)
      run: npx playwright install chromium --with-deps

    - name: Run Playwright Tests (Chromium Only)
      env:
        # Auth Secrets
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        LOGIN_URL: ${{ secrets.LOGIN_URL }}
        
        # Email Reporter Secrets
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        FAILURE_ALERT_EMAILS: ${{ secrets.FAILURE_ALERT_EMAILS }}
        DAILY_REPORT_EMAILS: ${{ secrets.DAILY_REPORT_EMAILS }}
        BASE_URL: ${{ secrets.BASE_URL }}
      # Explicitly runs only the 'chromium' project defined in playwright.config.js
      # This ensures 'setup' runs first (due to dependencies), then chromium tests.
      run: npx playwright test --project=chromium

    # ---------------------------------------------------------
    # ARTIFACTS: These make the reports visible in GitHub UI
    # ---------------------------------------------------------
    
    # 1. Upload the Standard Playwright HTML Report
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # 2. Upload your Custom Diagnostics (Screenshots/Videos)
    - name: Upload Custom Diagnostics
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: diagnostics
        path: diagnostics/
        retention-days: 30

    # 3. Upload Raw Test Results (Traces/Videos)
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 7
